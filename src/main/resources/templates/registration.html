<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <title>Taco Cloud - Register</title>
</head>

<body>

    <h1>Register</h1>

    <img th:src="@{/images/TacoCloud.png}"
         alt="Taco Cloud logo"/>

    <form method="POST"
          th:action="@{/register}"
          th:object="${registrationForm}"
          id="registerForm">

        <div>
            <label for="username">Username:</label>
            <input type="text"
                   id="username"
                   th:field="*{username}"/>
        </div>

        <div>
            <label for="password">Password:</label>
            <input type="password"
                   id="password"
                   th:field="*{password}"/>
        </div>

        <div>
            <label for="confirm">Confirm password:</label>
            <input type="password"
                   id="confirm"
                   th:field="*{confirm}"/>
        </div>

        <div>
            <label for="fullname">Full name:</label>
            <input type="text"
                   id="fullname"
                   th:field="*{fullname}"/>
        </div>

        <div>
            <label for="street">Street:</label>
            <input type="text"
                   id="street"
                   th:field="*{street}"/>
        </div>

        <div>
            <label for="city">City:</label>
            <input type="text"
                   id="city"
                   th:field="*{city}"/>
        </div>

        <div>
            <label for="state">State:</label>
            <input type="text"
                   id="state"
                   th:field="*{state}"/>
        </div>

        <div>
            <label for="zip">Zip:</label>
            <input type="text"
                   id="zip"
                   th:field="*{zip}"/>
        </div>

        <div>
            <label for="phoneNumber">Phone:</label>
            <input type="text"
                   id="phoneNumber"
                   th:field="*{phoneNumber}"/>
        </div>

        <div>
            <button type="submit">Register</button>
        </div>

    </form>

</body>
</html>
